<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy background with rounded corners -->
  <rect width="32" height="32" rx="6" fill="#0F2057"/>
  <!--
    Original viewBox="0 4 24 30" (24 wide × 30 tall).
    Uniform scale = 28/30 = 0.9333 so height fills the 28px content area.
    Scaled width = 24 * 0.9333 = 22.4px → center it: x offset = 2 + (28-22.4)/2 = 4.8
    Shift viewBox origin: translate(0, -4)
  -->
  <g transform="translate(4.8, 2) scale(0.9333) translate(0, -4)"
     stroke="#FFD100" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Graduation cap -->
    <g transform="translate(0, 1.5)">
      <path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/>
      <path d="M22 10v6"/>
      <path d="M6 12.5V18.5M18 12.5V18.5"/>
    </g>
    <!-- Robot face -->
    <g transform="translate(0, 12)">
      <rect width="16" height="12" x="4" y="8" rx="2"/>
      <path d="M2 14h2"/>
      <path d="M20 14h2"/>
      <path d="M15 13v2"/>
      <path d="M9 13v2"/>
    </g>
  </g>
</svg>
